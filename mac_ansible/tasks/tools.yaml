- name: Install other tools (tmux, fzf, rg, etc.)
  community.general.homebrew:
    name:
      - tmux
      - tmuxp
      - fzf
      - ripgrep
      - fd
      - zoxide
      - git-absorb
      - pipx
      - neovim
      - zsh-autosuggestions
    state: latest

# Colima & Docker
- name: Install Colima and Docker
  community.general.homebrew:
    name:
      - colima
      - docker
    state: latest

- name: Ensure Colima service is started
  community.general.homebrew_services:
    name: colima
    state: started

# xh
- name: Check for xh
  ansible.builtin.shell: command -v xh
  register: xh_exists
  ignore_errors: true

- name: Install xh
  when: xh_exists is failed
  community.general.homebrew:
    name: xh
    state: present

# tmux plugin manager
- name: Clone tpm from git
  ansible.builtin.git:
    force: true
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{tmux_plugins_path | default('~/.tmux/plugins/')}}/tpm"

- name: tpm repository cloned
  ansible.builtin.debug:
    msg: "tpm repository cloned to {{ tmux_plugins_path }}, install the plugin by updating configs with chezmoi and running tmux prefix + I"
  when: dir_to_check.stat.isdir is defined and dir_to_check.stat.isdir

