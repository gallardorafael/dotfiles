# Obsidian — install via DMG
- name: Check for Obsidian
  ansible.builtin.stat:
    path: /Applications/Obsidian.app
  register: obsidian_app

- name: Download Obsidian DMG
  when: not obsidian_app.stat.exists
  ansible.builtin.get_url:
    url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v{{obsidian_version | default('1.12.7')}}/Obsidian-{{obsidian_version | default('1.12.7')}}.dmg"
    dest: /tmp/obsidian.dmg

- name: Mount Obsidian DMG
  when: not obsidian_app.stat.exists
  ansible.builtin.shell: hdiutil attach /tmp/obsidian.dmg -nobrowse -quiet
  register: obsidian_mount

- name: Copy Obsidian to /Applications
  when: not obsidian_app.stat.exists
  ansible.builtin.shell: cp -R "/Volumes/Obsidian/Obsidian.app" /Applications/
  
- name: Unmount Obsidian DMG
  when: not obsidian_app.stat.exists
  ansible.builtin.shell: hdiutil detach /Volumes/Obsidian -quiet
  ignore_errors: true
